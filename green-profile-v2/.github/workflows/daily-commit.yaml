name: Daily Engineering Commit

on:
  schedule:
    # Runs at 8 AM CST every day (2 PM UTC, CST = UTC-6)
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate daily content
        id: generate
        run: |
          OUTPUT=$(python scripts/generate_content.py)
          CATEGORY=$(echo "$OUTPUT" | grep "CATEGORY=" | cut -d= -f2)
          echo "category=$CATEGORY" >> $GITHUB_OUTPUT

      - name: Commit and push
        run: |
          git config user.name "jitesh khemchandani"
          git config user.email "jitesh1995@users.noreply.github.com"

          git add -A

          DATE=$(date +%Y-%m-%d)
          CATEGORY="${{ steps.generate.outputs.category }}"

          # Pick a natural-sounding commit message based on category
          case "$CATEGORY" in
            ai-ml)
              MESSAGES=("add ml notes" "update ai-ml reference" "new ml snippet" "add ai notes" "ml implementation notes")
              ;;
            devops)
              MESSAGES=("add devops config" "update infra notes" "new k8s/terraform ref" "devops snippet" "add deployment config")
              ;;
            data-engineering)
              MESSAGES=("add data eng notes" "sql patterns update" "new pipeline reference" "data engineering snippet" "add etl notes")
              ;;
            software-engineering)
              MESSAGES=("add dsa notes" "update design patterns" "new algo implementation" "add code reference" "software eng notes")
              ;;
            *)
              MESSAGES=("update notes" "add new reference" "daily update")
              ;;
          esac

          # Pick message based on day of year
          DAY_OF_YEAR=$(date +%j)
          MSG_INDEX=$((DAY_OF_YEAR % ${#MESSAGES[@]}))
          MSG="${MESSAGES[$MSG_INDEX]}"

          git commit -m "$MSG" || echo "No changes to commit"
          git push
